<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Knicks Filter</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#003ca6" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Knicks" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<style>
  :root { --knicks-blue: #003ca6; --knicks-orange: #f58426; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; height: 100%; background: #000; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #fff; touch-action: manipulation;
  }
  #stage { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  /* frameBox is sized in JS to the frame's exact fitted rect, so the photo
     canvas never gets stretched (proportions preserved). */
  #frameBox { position: relative; }
  #frame { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; z-index: 2; pointer-events: none; }
  #editCanvas { position: absolute; z-index: 1; background: #fff; touch-action: none; }

  /* Frame picker strip (top) */
  #frames {
    position: absolute; top: 0; left: 0; right: 0; z-index: 6; display: none;
    gap: 8px; padding: calc(8px + env(safe-area-inset-top)) 10px 8px;
    overflow-x: auto; white-space: nowrap; background: linear-gradient(#000a, #0000);
  }
  #frames.show { display: flex; }
  .thumb {
    height: 64px; width: auto; border-radius: 8px; border: 2px solid transparent;
    flex: 0 0 auto; background: #fff; cursor: pointer; object-fit: contain;
  }
  .thumb.active { border-color: var(--knicks-orange); }

  /* Bottom controls */
  #controls {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 5;
    padding: 12px 14px calc(14px + env(safe-area-inset-bottom));
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  #zoomRow { display: none; align-items: center; gap: 10px; width: min(92%, 420px); }
  #zoomRow.show { display: flex; }
  #zoom { flex: 1; accent-color: var(--knicks-orange); }
  .zlabel { font-size: 18px; opacity: 0.9; width: 18px; text-align: center; }
  #btnRow { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 10px; }
  .btn {
    padding: 12px 16px; border: none; border-radius: 999px; font-size: 15px;
    font-weight: 700; cursor: pointer; color: #fff;
  }
  .btn.primary { background: var(--knicks-orange); }
  .btn.ghost { background: rgba(0,0,0,0.5); backdrop-filter: blur(6px); }
  .btn:active { transform: scale(0.96); }
  .btn[disabled] { opacity: 0.4; }

  /* Intro overlay */
  #msg {
    position: absolute; inset: 0; z-index: 10; display: flex;
    flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 32px; gap: 14px; background: var(--knicks-blue);
  }
  #msg.hide { display: none; }
  #msg h1 { margin: 0; font-size: 24px; }
  #msg p { margin: 0 0 6px; opacity: 0.92; line-height: 1.5; max-width: 320px; }

  .toast {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    z-index: 30; background: rgba(0,0,0,0.82); padding: 10px 16px; border-radius: 999px;
    font-size: 14px; opacity: 0; transition: opacity .2s; pointer-events: none; max-width: 86%;
    text-align: center;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
  <div id="frames"></div>

  <div id="stage">
    <div id="frameBox">
      <canvas id="editCanvas"></canvas>
      <img id="frame" alt="Knicks frame" />
    </div>
  </div>

  <div id="controls">
    <div id="zoomRow">
      <span class="zlabel">&#x2212;</span>
      <input id="zoom" type="range" min="1" max="5" step="0.01" value="1" />
      <span class="zlabel">+</span>
    </div>
    <div id="btnRow">
      <button class="btn ghost" id="camBtn2">📷 Retake</button>
      <button class="btn ghost" id="pickBtn2">🖼 Library</button>
      <button class="btn ghost" id="saveBtn" disabled>⬇️ Save</button>
      <button class="btn primary" id="printBtn" disabled>🖨️ Print</button>
    </div>
  </div>

  <div id="msg">
    <h1>Let's Go Knicks! 🏀</h1>
    <p>Take a photo and it drops into the frame. Drag and pinch to position it, then save or print.</p>
    <button class="btn primary" id="camBtn">📷 Take Photo</button>
    <button class="btn ghost" id="pickBtn">🖼 Choose from Library</button>
  </div>

  <div class="toast" id="toast"></div>
  <input id="file" type="file" accept="image/*" hidden />
  <input id="cam" type="file" accept="image/*" capture="user" hidden />

<script>
const frameImg = document.getElementById('frame');
const stage    = document.getElementById('stage');
const frameBox = document.getElementById('frameBox');
const framesBar= document.getElementById('frames');
const canvas   = document.getElementById('editCanvas');
const ctx      = canvas.getContext('2d');
const fileIn   = document.getElementById('file');
const camIn    = document.getElementById('cam');
const zoomRow  = document.getElementById('zoomRow');
const zoom     = document.getElementById('zoom');
const saveBtn  = document.getElementById('saveBtn');
const printBtn = document.getElementById('printBtn');
const pickBtn  = document.getElementById('pickBtn');
const pickBtn2 = document.getElementById('pickBtn2');
const camBtn   = document.getElementById('camBtn');
const camBtn2  = document.getElementById('camBtn2');
const msg      = document.getElementById('msg');
const toastEl  = document.getElementById('toast');

let win = null;            // transparent photo window {x,y,w,h,W,H} in frame px
let img = null;            // loaded photo
let imgW = 0, imgH = 0;
let baseScale = 1, z = 1, panX = 0, panY = 0, minZoom = 1;

function toast(t) {
  toastEl.textContent = t; toastEl.classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(() => toastEl.classList.remove('show'), 2200);
}

/* ---------------- Frames ---------------- */
let FRAMES = [{ name: 'Brunson', src: 'frame_transparent.png' }];
let frameIndex = 0;

async function initFrames() {
  try {
    const r = await fetch('frames.json', { cache: 'no-store' });
    if (r.ok) { const j = await r.json(); if (j.frames && j.frames.length) FRAMES = j.frames; }
  } catch (e) {}
  framesBar.innerHTML = '';
  FRAMES.forEach((f, i) => {
    const t = document.createElement('img');
    t.className = 'thumb' + (i === 0 ? ' active' : '');
    t.src = f.src; t.alt = f.name; t.title = f.name;
    t.addEventListener('click', () => setFrame(i));
    framesBar.appendChild(t);
  });
  if (FRAMES.length > 1) framesBar.classList.add('show');
  setFrame(0);
}
function setFrame(i) {
  frameIndex = i;
  [...framesBar.children].forEach((el, k) => el.classList.toggle('active', k === i));
  frameImg.src = FRAMES[i].src;     // triggers the load handler below
}

/* ---- Size frameBox to the frame's exact fitted rect (no stretching) ---- */
function layout() {
  if (!win) return;
  const sw = stage.clientWidth, sh = stage.clientHeight;
  const ar = win.W / win.H;
  let w = sw, h = sw / ar;
  if (h > sh) { h = sh; w = sh * ar; }
  frameBox.style.width = w + 'px';
  frameBox.style.height = h + 'px';
}
window.addEventListener('resize', layout);
window.addEventListener('orientationchange', () => setTimeout(layout, 200));

/* ------- Detect the transparent window from the frame's alpha ------- */
frameImg.addEventListener('load', () => {
  const W = frameImg.naturalWidth, H = frameImg.naturalHeight;
  if (!W || !H) return;

  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const cc = c.getContext('2d');
  cc.drawImage(frameImg, 0, 0);
  const data = cc.getImageData(0, 0, W, H).data;
  let minX = W, minY = H, maxX = 0, maxY = 0;
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      if (data[(y * W + x) * 4 + 3] < 10) {
        if (x < minX) minX = x; if (x > maxX) maxX = x;
        if (y < minY) minY = y; if (y > maxY) maxY = y;
      }
    }
  }
  win = { x: minX, y: minY, w: maxX - minX + 1, h: maxY - minY + 1, W, H };

  // Canvas backing = window's native pixels; CSS position = % of frameBox.
  canvas.width = win.w; canvas.height = win.h;
  canvas.style.left   = (win.x / W * 100) + '%';
  canvas.style.top    = (win.y / H * 100) + '%';
  canvas.style.width  = (win.w / W * 100) + '%';
  canvas.style.height = (win.h / H * 100) + '%';

  layout();
  if (img) { refit(); render(); }
});

/* ---------------- Load a photo ---------------- */
function refit() {
  const cover   = Math.max(win.w / imgW, win.h / imgH);   // fills the window
  const contain = Math.min(win.w / imgW, win.h / imgH);   // whole photo visible
  baseScale = cover;
  minZoom = contain / cover;          // < 1, so you can zoom OUT to the whole photo
  zoom.min = minZoom;
  z = minZoom;                        // open showing the whole photo (not zoomed in)
  panX = 0; panY = 0; zoom.value = z;
}
async function loadPhoto(srcFile) {
  if (!srcFile) return;
  try {
    if (window.createImageBitmap) img = await createImageBitmap(srcFile, { imageOrientation: 'from-image' });
    else throw 0;
  } catch (e) {
    img = await new Promise((res, rej) => {
      const im = new Image(); im.onload = () => res(im); im.onerror = rej;
      im.src = (srcFile instanceof Blob) ? URL.createObjectURL(srcFile) : srcFile;
    });
  }
  imgW = img.width || img.naturalWidth;
  imgH = img.height || img.naturalHeight;
  refit();
  msg.classList.add('hide');
  zoomRow.classList.add('show');
  saveBtn.disabled = false; printBtn.disabled = false;
  render();
  toast('Drag to move • pinch or slider to zoom');
}
pickBtn.addEventListener('click', () => fileIn.click());
pickBtn2.addEventListener('click', () => fileIn.click());
camBtn.addEventListener('click', () => camIn.click());
camBtn2.addEventListener('click', () => camIn.click());
fileIn.addEventListener('change', (e) => { loadPhoto(e.target.files[0]); fileIn.value = ''; });
camIn.addEventListener('change', (e) => { loadPhoto(e.target.files[0]); camIn.value = ''; });

/* ---------------- Editor render (aspect-preserving cover) ---------------- */
function clampPan() {
  const dw = imgW * baseScale * z, dh = imgH * baseScale * z;
  const mx = Math.max(0, (dw - win.w) / 2), my = Math.max(0, (dh - win.h) / 2);
  panX = Math.max(-mx, Math.min(mx, panX));
  panY = Math.max(-my, Math.min(my, panY));
}
function placement() {
  const dw = imgW * baseScale * z, dh = imgH * baseScale * z;
  return { dw, dh, ox: (win.w - dw) / 2 + panX, oy: (win.h - dh) / 2 + panY };
}
function render() {
  if (!img || !win) return;
  clampPan();
  const { dw, dh, ox, oy } = placement();
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, win.w, win.h);
  ctx.drawImage(img, ox, oy, dw, dh);   // dw/dh share one scale → no distortion
}
zoom.addEventListener('input', () => { z = parseFloat(zoom.value); render(); });

/* ---------------- Drag / pinch ---------------- */
const pointers = new Map();
let pinchStart = null;
function canvasScale() { return canvas.clientWidth / win.w; }
canvas.addEventListener('pointerdown', (e) => {
  canvas.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pointers.size === 2) {
    const p = [...pointers.values()];
    pinchStart = { dist: Math.hypot(p[0].x - p[1].x, p[0].y - p[1].y), z };
  }
});
canvas.addEventListener('pointermove', (e) => {
  if (!pointers.has(e.pointerId) || !img) return;
  const prev = pointers.get(e.pointerId);
  const dx = e.clientX - prev.x, dy = e.clientY - prev.y;
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pointers.size === 2 && pinchStart) {
    const p = [...pointers.values()];
    const dist = Math.hypot(p[0].x - p[1].x, p[0].y - p[1].y);
    z = Math.max(minZoom, Math.min(5, pinchStart.z * (dist / pinchStart.dist)));
    zoom.value = z; render();
  } else if (pointers.size === 1) {
    const s = canvasScale();
    panX += dx / s; panY += dy / s; render();
  }
});
function endPointer(e) { pointers.delete(e.pointerId); if (pointers.size < 2) pinchStart = null; }
canvas.addEventListener('pointerup', endPointer);
canvas.addEventListener('pointercancel', endPointer);
let lastTap = 0;
canvas.addEventListener('pointerup', () => {
  const now = performance.now();
  if (now - lastTap < 300) { z = minZoom; zoom.value = minZoom; panX = 0; panY = 0; render(); }
  lastTap = now;
});

/* ---------------- Export (Save / Print) ---------------- */
let lastURL = null;
async function exportImage() {
  if (!img || !win) return null;
  // Print frames (out:"2:3") pad to 2:3 for the Polaroid; story frames
  // (out:"native") export at their own 9:16 shape for Instagram.
  const mode = (FRAMES[frameIndex] && FRAMES[frameIndex].out) || '2:3';
  let outW, padX;
  if (mode === '2:3') {
    const targetW = Math.round(win.H * 2 / 3);   // 2:3 = Polaroid Hi-Print paper
    outW = Math.max(win.W, targetW);
    padX = Math.round((outW - win.W) / 2);
  } else {
    outW = win.W; padX = 0;                      // native frame ratio (no padding)
  }
  const out = document.createElement('canvas');
  out.width = outW; out.height = win.H;
  const o = out.getContext('2d');
  o.fillStyle = 'rgb(0,60,166)';
  o.fillRect(0, 0, outW, win.H);
  o.translate(padX, 0);
  o.fillStyle = '#fff';
  o.fillRect(win.x, win.y, win.w, win.h);
  const { dw, dh, ox, oy } = placement();
  o.save();
  o.beginPath(); o.rect(win.x, win.y, win.w, win.h); o.clip();
  o.drawImage(img, win.x + ox, win.y + oy, dw, dh);
  o.restore();
  o.drawImage(frameImg, 0, 0, win.W, win.H);
  return await new Promise((res) => out.toBlob((b) => res(b), 'image/jpeg', 0.95));
}
async function share(intent) {
  const blob = await exportImage();
  if (!blob) return;
  if (lastURL) URL.revokeObjectURL(lastURL);
  lastURL = URL.createObjectURL(blob);
  const file = new File([blob], 'knicks.jpg', { type: 'image/jpeg' });
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try { await navigator.share({ files: [file], title: 'Knicks photo' }); return; }
    catch (e) { if (e && e.name === 'AbortError') return; }
  }
  const a = document.createElement('a');
  a.href = lastURL; a.download = 'knicks.jpg';
  document.body.appendChild(a); a.click(); a.remove();
  toast(intent === 'print' ? 'Saved — open it in your printer app' : 'Saved to your downloads');
}
saveBtn.addEventListener('click', () => share('save'));
printBtn.addEventListener('click', () => share('print'));

/* ---------------- Go ---------------- */
initFrames();
</script>
</body>
</html>
