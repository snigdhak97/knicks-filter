<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Knicks Photo Booth</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#003ca6" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Knicks" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet" />
<style>
  :root { --blue: #003ca6; --orange: #f58426; --marker: 'Permanent Marker', 'Comic Sans MS', cursive; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; height: 100%; background: #fff; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #111;
    touch-action: manipulation;
  }
  .view { position: absolute; inset: 0; display: flex; flex-direction: column; }
  .view.hidden { display: none; }

  /* Title bar */
  .titlebar {
    flex: 0 0 auto; background: var(--blue); color: #fff;
    font-family: var(--marker); text-align: center; letter-spacing: 1px;
    padding: calc(14px + env(safe-area-inset-top)) 16px 14px;
    font-size: 24px;
  }
  .titlebar .ball { font-family: sans-serif; }

  /* Bottom action bar */
  .bottombar {
    flex: 0 0 auto; display: flex; align-items: center; justify-content: space-around;
    gap: 8px; padding: 14px 12px calc(14px + env(safe-area-inset-bottom));
    background: #fff; border-top: 2px solid #eee;
  }
  .act {
    font-family: var(--marker); font-size: 17px; letter-spacing: 0.5px; white-space: nowrap;
    background: none; border: none; color: var(--blue); cursor: pointer; padding: 8px 8px;
  }
  .act.primary { color: var(--orange); }
  .act:active { transform: scale(0.95); }
  .act[disabled] { opacity: 0.35; }

  /* ---------- HOME (gallery) ---------- */
  #gridWrap { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 18px 16px 8px; }
  #grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .card {
    background: #e9e9e9; border-radius: 14px; padding: 8px;
    border: 3px solid transparent; cursor: pointer; display: flex; flex-direction: column;
    align-items: center; transition: border-color .15s, transform .1s;
  }
  .card.active { border-color: var(--orange); }
  .card:active { transform: scale(0.98); }
  .card img { width: 100%; height: 30vh; object-fit: contain; border-radius: 8px; pointer-events: none; }
  .card .label { font-family: var(--marker); font-size: 18px; margin: 8px 0 4px; color: #222; }
  .hint { text-align: center; font-family: var(--marker); color: #888; padding: 6px 0 2px; font-size: 15px; }

  /* ---------- EDITOR ---------- */
  #stage { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; background: #fafafa; }
  #frameBox { position: relative; }
  #frame { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; z-index: 2; pointer-events: none; }
  #editCanvas { position: absolute; z-index: 1; background: #fff; touch-action: none; }
  #zoomRow { flex: 0 0 auto; display: flex; align-items: center; gap: 10px; padding: 10px 22px 2px; }
  #zoom { flex: 1; accent-color: var(--orange); }
  .zlabel { font-size: 18px; opacity: 0.8; width: 16px; text-align: center; }

  .toast {
    position: absolute; top: calc(16px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
    z-index: 40; background: rgba(0,0,0,0.82); color: #fff; padding: 10px 16px; border-radius: 999px;
    font-size: 14px; opacity: 0; transition: opacity .2s; pointer-events: none; max-width: 86%; text-align: center;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
  <!-- ========== HOME / GALLERY ========== -->
  <div id="home" class="view">
    <div class="titlebar"><span class="ball">🏀</span> Knicks Photo Booth</div>
    <div id="gridWrap">
      <div class="hint">Pick a frame, then take or choose a photo</div>
      <div id="grid"></div>
    </div>
    <div class="bottombar">
      <button class="act primary" id="homeTake">Take Photo</button>
      <button class="act" id="homeSelect">Select Photo</button>
      <button class="act" id="homePrint">Print</button>
    </div>
  </div>

  <!-- ========== EDITOR ========== -->
  <div id="editor" class="view hidden">
    <div class="titlebar"><span class="ball">🏀</span> Knicks Photo Booth</div>
    <div id="stage">
      <div id="frameBox">
        <canvas id="editCanvas"></canvas>
        <img id="frame" alt="Knicks frame" />
      </div>
    </div>
    <div id="zoomRow">
      <span class="zlabel">&#x2212;</span>
      <input id="zoom" type="range" min="1" max="5" step="0.01" value="1" />
      <span class="zlabel">+</span>
    </div>
    <div class="bottombar">
      <button class="act primary" id="edPrint">Print</button>
      <button class="act" id="edSave">Save</button>
      <button class="act" id="edOneMore">One More</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <input id="file" type="file" accept="image/*" hidden />
  <input id="cam" type="file" accept="image/*" capture="user" hidden />

<script>
const homeView = document.getElementById('home');
const editorView = document.getElementById('editor');
const grid     = document.getElementById('grid');
const frameImg = document.getElementById('frame');
const stage    = document.getElementById('stage');
const frameBox = document.getElementById('frameBox');
const canvas   = document.getElementById('editCanvas');
const ctx      = canvas.getContext('2d');
const fileIn   = document.getElementById('file');
const camIn    = document.getElementById('cam');
const zoom     = document.getElementById('zoom');
const toastEl  = document.getElementById('toast');

let win = null;            // transparent photo window {x,y,w,h,W,H} in frame px
let img = null;            // loaded photo
let imgW = 0, imgH = 0;
let baseScale = 1, z = 1, panX = 0, panY = 0, minZoom = 1, renderScale = 1;
let frameIndex = 0;        // selected frame
let pendingEditor = false; // waiting for frame to finish loading before showing editor

function toast(t) {
  toastEl.textContent = t; toastEl.classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(() => toastEl.classList.remove('show'), 2200);
}
function showView(name) {
  homeView.classList.toggle('hidden', name !== 'home');
  editorView.classList.toggle('hidden', name !== 'editor');
}

/* ---------------- Frames / gallery ---------------- */
let FRAMES = [{ name: 'Brunson', src: 'frame_transparent.png', out: '2:3' }];

async function initFrames() {
  try {
    const r = await fetch('frames.json', { cache: 'no-store' });
    if (r.ok) { const j = await r.json(); if (j.frames && j.frames.length) FRAMES = j.frames; }
  } catch (e) {}
  grid.innerHTML = '';
  FRAMES.forEach((f, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (i === 0 ? ' active' : '');
    card.innerHTML = '<img src="' + f.src + '" alt="' + f.name + '"><div class="label">' + f.name + '</div>';
    card.addEventListener('click', () => selectFrame(i));
    grid.appendChild(card);
  });
  selectFrame(0);
}
function selectFrame(i) {
  frameIndex = i;
  [...grid.children].forEach((el, k) => el.classList.toggle('active', k === i));
  if (frameImg.getAttribute('src') !== FRAMES[i].src) frameImg.src = FRAMES[i].src;  // preload + detect window
}

/* ---- Size frameBox to the frame's exact fitted rect (no stretching) ---- */
function layout() {
  if (!win) return;
  const sw = stage.clientWidth, sh = stage.clientHeight;
  if (!sw || !sh) return;
  const ar = win.W / win.H;
  let w = sw, h = sw / ar;
  if (h > sh) { h = sh; w = sh * ar; }
  frameBox.style.width = w + 'px';
  frameBox.style.height = h + 'px';
}
window.addEventListener('resize', layout);
window.addEventListener('orientationchange', () => setTimeout(layout, 200));

/* ------- Detect the transparent window from the frame's alpha ------- */
frameImg.addEventListener('load', () => {
  const W = frameImg.naturalWidth, H = frameImg.naturalHeight;
  if (!W || !H) return;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const cc = c.getContext('2d');
  cc.drawImage(frameImg, 0, 0);
  const data = cc.getImageData(0, 0, W, H).data;
  let minX = W, minY = H, maxX = 0, maxY = 0;
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      if (data[(y * W + x) * 4 + 3] < 10) {
        if (x < minX) minX = x; if (x > maxX) maxX = x;
        if (y < minY) minY = y; if (y > maxY) maxY = y;
      }
    }
  }
  win = { x: minX, y: minY, w: maxX - minX + 1, h: maxY - minY + 1, W, H };
  // Supersample the preview canvas well above the frame's native window size
  // so it stays crisp on hi-DPI screens (the window is only ~440px otherwise).
  renderScale = Math.min(4, Math.max(2, 1400 / win.w));
  canvas.width = Math.round(win.w * renderScale);
  canvas.height = Math.round(win.h * renderScale);
  ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high';
  canvas.style.left   = (win.x / W * 100) + '%';
  canvas.style.top    = (win.y / H * 100) + '%';
  canvas.style.width  = (win.w / W * 100) + '%';
  canvas.style.height = (win.h / H * 100) + '%';
  if (img && pendingEditor) enterEditor();
  else if (img) { layout(); render(); }
});

/* ---------------- Load a photo + enter editor ---------------- */
function refit() {
  const cover   = Math.max(win.w / imgW, win.h / imgH);
  const contain = Math.min(win.w / imgW, win.h / imgH);
  baseScale = cover;
  minZoom = contain / cover;          // < 1, so you can zoom OUT to the whole photo
  zoom.min = minZoom;
  z = minZoom;                        // open showing the whole photo
  panX = 0; panY = 0; zoom.value = z;
}
function enterEditor() {
  if (!img) return;
  if (!win) { pendingEditor = true; return; }   // frame still loading
  pendingEditor = false;
  showView('editor');
  refit(); layout(); render();
}
async function loadPhoto(srcFile) {
  if (!srcFile) return;
  try {
    if (window.createImageBitmap) img = await createImageBitmap(srcFile, { imageOrientation: 'from-image' });
    else throw 0;
  } catch (e) {
    img = await new Promise((res, rej) => {
      const im = new Image(); im.onload = () => res(im); im.onerror = rej;
      im.src = (srcFile instanceof Blob) ? URL.createObjectURL(srcFile) : srcFile;
    });
  }
  imgW = img.width || img.naturalWidth;
  imgH = img.height || img.naturalHeight;
  enterEditor();
}

/* ---------------- Gallery buttons ---------------- */
document.getElementById('homeTake').addEventListener('click', () => { pendingEditor = true; camIn.click(); });
document.getElementById('homeSelect').addEventListener('click', () => { pendingEditor = true; fileIn.click(); });
document.getElementById('homePrint').addEventListener('click', () => {
  if (img) share('print'); else toast('Pick a frame and take a photo first');
});
fileIn.addEventListener('change', (e) => { loadPhoto(e.target.files[0]); fileIn.value = ''; });
camIn.addEventListener('change', (e) => { loadPhoto(e.target.files[0]); camIn.value = ''; });

/* ---------------- Editor buttons ---------------- */
document.getElementById('edPrint').addEventListener('click', () => share('print'));
document.getElementById('edSave').addEventListener('click', () => share('save'));
document.getElementById('edOneMore').addEventListener('click', () => { showView('home'); });

/* ---------------- Editor render (aspect-preserving) ---------------- */
function clampPan() {
  const dw = imgW * baseScale * z, dh = imgH * baseScale * z;
  const mx = Math.max(0, (dw - win.w) / 2), my = Math.max(0, (dh - win.h) / 2);
  panX = Math.max(-mx, Math.min(mx, panX));
  panY = Math.max(-my, Math.min(my, panY));
}
function placement() {
  const dw = imgW * baseScale * z, dh = imgH * baseScale * z;
  return { dw, dh, ox: (win.w - dw) / 2 + panX, oy: (win.h - dh) / 2 + panY };
}
function render() {
  if (!img || !win) return;
  clampPan();
  const { dw, dh, ox, oy } = placement();
  ctx.setTransform(renderScale, 0, 0, renderScale, 0, 0);  // draw at hi-res
  ctx.imageSmoothingQuality = 'high';
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, win.w, win.h);
  ctx.drawImage(img, ox, oy, dw, dh);
}
zoom.addEventListener('input', () => { z = parseFloat(zoom.value); render(); });

/* ---------------- Drag / pinch ---------------- */
const pointers = new Map();
let pinchStart = null;
function canvasScale() { return canvas.clientWidth / win.w; }
canvas.addEventListener('pointerdown', (e) => {
  canvas.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pointers.size === 2) {
    const p = [...pointers.values()];
    pinchStart = { dist: Math.hypot(p[0].x - p[1].x, p[0].y - p[1].y), z };
  }
});
canvas.addEventListener('pointermove', (e) => {
  if (!pointers.has(e.pointerId) || !img) return;
  const prev = pointers.get(e.pointerId);
  const dx = e.clientX - prev.x, dy = e.clientY - prev.y;
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pointers.size === 2 && pinchStart) {
    const p = [...pointers.values()];
    const dist = Math.hypot(p[0].x - p[1].x, p[0].y - p[1].y);
    z = Math.max(minZoom, Math.min(5, pinchStart.z * (dist / pinchStart.dist)));
    zoom.value = z; render();
  } else if (pointers.size === 1) {
    const s = canvasScale();
    panX += dx / s; panY += dy / s; render();
  }
});
function endPointer(e) { pointers.delete(e.pointerId); if (pointers.size < 2) pinchStart = null; }
canvas.addEventListener('pointerup', endPointer);
canvas.addEventListener('pointercancel', endPointer);
let lastTap = 0;
canvas.addEventListener('pointerup', () => {
  const now = performance.now();
  if (now - lastTap < 300) { z = minZoom; zoom.value = minZoom; panX = 0; panY = 0; render(); }
  lastTap = now;
});

/* ---------------- Export (Save / Print) ---------------- */
let lastURL = null;
async function exportImage() {
  if (!img || !win) return null;
  const mode = (FRAMES[frameIndex] && FRAMES[frameIndex].out) || '2:3';
  let outW, padX;
  if (mode === '2:3') {
    const targetW = Math.round(win.H * 2 / 3);   // 2:3 = Polaroid Hi-Print paper
    outW = Math.max(win.W, targetW);
    padX = Math.round((outW - win.W) / 2);
  } else {
    outW = win.W; padX = 0;                      // native frame ratio (no padding)
  }
  // Render the file at 2-3x the frame's native size so the high-res photo
  // keeps its detail (the frame art upscales cleanly).
  const ES = Math.min(3, Math.max(1, 1500 / win.W));
  const out = document.createElement('canvas');
  out.width = Math.round(outW * ES); out.height = Math.round(win.H * ES);
  const o = out.getContext('2d');
  o.imageSmoothingEnabled = true; o.imageSmoothingQuality = 'high';
  o.scale(ES, ES);
  o.fillStyle = 'rgb(0,60,166)';
  o.fillRect(0, 0, outW, win.H);
  o.translate(padX, 0);
  o.fillStyle = '#fff';
  o.fillRect(win.x, win.y, win.w, win.h);
  const { dw, dh, ox, oy } = placement();
  o.save();
  o.beginPath(); o.rect(win.x, win.y, win.w, win.h); o.clip();
  o.drawImage(img, win.x + ox, win.y + oy, dw, dh);
  o.restore();
  o.drawImage(frameImg, 0, 0, win.W, win.H);
  return await new Promise((res) => out.toBlob((b) => res(b), 'image/jpeg', 0.95));
}
async function share(intent) {
  const blob = await exportImage();
  if (!blob) { toast('Take a photo first'); return; }
  if (lastURL) URL.revokeObjectURL(lastURL);
  lastURL = URL.createObjectURL(blob);
  const file = new File([blob], 'knicks.jpg', { type: 'image/jpeg' });
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try { await navigator.share({ files: [file], title: 'Knicks photo' }); return; }
    catch (e) { if (e && e.name === 'AbortError') return; }
  }
  const a = document.createElement('a');
  a.href = lastURL; a.download = 'knicks.jpg';
  document.body.appendChild(a); a.click(); a.remove();
  toast(intent === 'print' ? 'Saved — open it in your printer app' : 'Saved to your downloads');
}

/* ---------------- Go ---------------- */
initFrames();
</script>
</body>
</html>
